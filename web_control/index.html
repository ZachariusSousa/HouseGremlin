<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robit Control</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        background: #f5f7f8;
        color: #1b1f23;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1, h2 {
        margin: 0;
      }

      section {
        background: #ffffff;
        border: 1px solid #d8dee4;
        border-radius: 8px;
        padding: 16px;
        margin: 14px 0;
      }

      label {
        display: block;
        margin: 10px 0 6px;
        font-weight: 700;
      }

      input[type="url"], input[type="range"] {
        width: 100%;
        box-sizing: border-box;
      }

      input[type="url"] {
        padding: 10px;
        border: 1px solid #c6cbd1;
        border-radius: 6px;
        font-size: 16px;
      }

      .drive-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(80px, 1fr));
        gap: 8px;
        max-width: 360px;
        margin: 0 auto;
      }

      button {
        min-height: 48px;
        border: 1px solid #9aa4ad;
        border-radius: 8px;
        background: #ffffff;
        font-size: 18px;
        cursor: pointer;
      }

      button:active {
        background: #dbeafe;
      }

      .spacer {
        visibility: hidden;
      }

      .status {
        min-height: 22px;
        font-family: Consolas, monospace;
        font-size: 14px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Robit Control</h1>
        <button id="stopButton" type="button">Stop</button>
      </header>

      <section>
        <h2>Connection</h2>
        <label for="brainUrl">PC brain URL</label>
        <input id="brainUrl" type="url" value="http://localhost:8080">
        <p id="status" class="status">Not connected</p>
      </section>

      <section>
        <h2>Drive</h2>
        <div class="drive-grid">
          <button class="spacer" tabindex="-1"></button>
          <button data-move="forward">W</button>
          <button class="spacer" tabindex="-1"></button>
          <button data-move="left">A</button>
          <button data-move="stop">Stop</button>
          <button data-move="right">D</button>
          <button class="spacer" tabindex="-1"></button>
          <button data-move="reverse">S</button>
          <button class="spacer" tabindex="-1"></button>
        </div>
        <label for="speed">Speed: <span id="speedValue">180</span></label>
        <input id="speed" type="range" min="0" max="255" value="180">
      </section>

      <section>
        <h2>Head</h2>
        <label for="pan">Pan: <span id="panValue">90</span></label>
        <input id="pan" type="range" min="55" max="135" value="90">
        <label for="tilt">Tilt: <span id="tiltValue">90</span></label>
        <input id="tilt" type="range" min="35" max="115" value="90">
        <button id="centerButton" type="button">Center</button>
      </section>
    </main>

    <script>
      const brainUrlInput = document.getElementById("brainUrl");
      const statusEl = document.getElementById("status");
      const speedInput = document.getElementById("speed");
      const speedValue = document.getElementById("speedValue");
      const panInput = document.getElementById("pan");
      const panValue = document.getElementById("panValue");
      const tiltInput = document.getElementById("tilt");
      const tiltValue = document.getElementById("tiltValue");
      const keys = new Set();

      function brainUrl(path) {
        return brainUrlInput.value.replace(/\/$/, "") + path;
      }

      async function post(path, body = {}) {
        const response = await fetch(brainUrl(path), {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      async function drive(move) {
        try {
          await post("/robot/drive", { move, speed: Number(speedInput.value) });
          statusEl.textContent = `move=${move}`;
        } catch (error) {
          statusEl.textContent = String(error);
        }
      }

      async function setHead(update) {
        try {
          await post("/robot/head", update);
        } catch (error) {
          statusEl.textContent = String(error);
        }
      }

      document.querySelectorAll("[data-move]").forEach((button) => {
        const move = button.dataset.move;
        button.addEventListener("mousedown", () => drive(move));
        button.addEventListener("mouseup", () => drive("stop"));
        button.addEventListener("mouseleave", () => drive("stop"));
        button.addEventListener("touchstart", (event) => {
          event.preventDefault();
          drive(move);
        });
        button.addEventListener("touchend", () => drive("stop"));
      });

      document.getElementById("stopButton").addEventListener("click", () => drive("stop"));
      speedInput.addEventListener("input", () => {
        speedValue.textContent = speedInput.value;
      });

      panInput.addEventListener("input", () => {
        panValue.textContent = panInput.value;
        setHead({ pan: Number(panInput.value) });
      });

      tiltInput.addEventListener("input", () => {
        tiltValue.textContent = tiltInput.value;
        setHead({ tilt: Number(tiltInput.value) });
      });

      document.getElementById("centerButton").addEventListener("click", () => {
        panInput.value = 90;
        tiltInput.value = 90;
        panValue.textContent = "90";
        tiltValue.textContent = "90";
        setHead({ pan: 90, tilt: 90 });
      });

      document.addEventListener("keydown", (event) => {
        if (event.repeat) return;
        keys.add(event.code);
        if (event.code === "KeyW") drive("forward");
        if (event.code === "KeyS") drive("reverse");
        if (event.code === "KeyA") drive("left");
        if (event.code === "KeyD") drive("right");
        if (event.code === "Space") {
          event.preventDefault();
          drive("stop");
        }
      });

      document.addEventListener("keyup", (event) => {
        keys.delete(event.code);
        if (["KeyW", "KeyA", "KeyS", "KeyD"].includes(event.code)) {
          drive("stop");
        }
      });
    </script>
  </body>
</html>
